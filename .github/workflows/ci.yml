name: CI/CD EventSpace Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1 : Verification Backend ───────────────────────────────────────────
  backend-check:
    name: Backend - Verification syntaxe
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation dependances
        working-directory: backend
        run: npm ci --only=production

      - name: Verification server.js
        working-directory: backend
        run: node --check server.js

      - name: Verification controllers
        working-directory: backend
        run: find controllers -name "*.js" -exec node --check {} \;

      - name: Verification models
        working-directory: backend
        run: find models -name "*.js" -exec node --check {} \;

      - name: Verification routes
        working-directory: backend
        run: find routes -name "*.js" -exec node --check {} \;

  # ── Job 2 : Build Frontend ─────────────────────────────────────────────────
  frontend-build:
    name: Frontend - Build Vite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installation dependances
        working-directory: frontend
        run: npm ci

      - name: Build production
        working-directory: frontend
        run: npm run build

  # ── Job 3 : Build + Push Docker Hub ────────────────────────────────────────
  docker-build-push:
    name: Docker - Build et Push Docker Hub
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push image Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            schlarhmo/eventspace-backend:latest
            schlarhmo/eventspace-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build et Push image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            schlarhmo/eventspace-frontend:latest
            schlarhmo/eventspace-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resume
        run: |
          echo "## CI/CD OK" >> $GITHUB_STEP_SUMMARY
          echo "Images poussees sur Docker Hub:" >> $GITHUB_STEP_SUMMARY
          echo "- schlarhmo/eventspace-backend:latest" >> $GITHUB_STEP_SUMMARY
          echo "- schlarhmo/eventspace-frontend:latest" >> $GITHUB_STEP_SUMMARY
