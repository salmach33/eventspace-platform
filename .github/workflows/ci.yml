name: CI EventSpace Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1 : Verification Backend ───────────────────────────────────────────
  backend-check:
    name: Backend - Verification syntaxe
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Installation dependances
        working-directory: backend
        run: npm ci --only=production

      - name: Verification server.js
        working-directory: backend
        run: node --check server.js

      - name: Verification controllers
        working-directory: backend
        run: find controllers -name "*.js" -exec node --check {} \;

      - name: Verification models
        working-directory: backend
        run: find models -name "*.js" -exec node --check {} \;

      - name: Verification routes
        working-directory: backend
        run: find routes -name "*.js" -exec node --check {} \;

  # ── Job 2 : Build Frontend ─────────────────────────────────────────────────
  frontend-build:
    name: Frontend - Build Vite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installation dependances
        working-directory: frontend
        run: npm ci

      - name: Build production
        working-directory: frontend
        run: npm run build

      - name: Upload artefact dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ── Job 3 : Build Docker images (sans push) ────────────────────────────────
  docker-build:
    name: Docker - Build images
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: eventspace-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: eventspace-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resume
        run: |
          echo "## CI OK" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend syntaxe | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend build Vite | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker image backend | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker image frontend | OK |" >> $GITHUB_STEP_SUMMARY
