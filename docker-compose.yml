version: "3.9"

services:

  # ── Frontend (image Docker Hub, mise a jour auto par Watchtower) ──────────
  frontend:
    image: schlarhmo/eventspace-frontend:latest
    container_name: eventspace-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - eventspace-network
    restart: unless-stopped

  # ── Backend (image Docker Hub, mise a jour auto par Watchtower) ───────────
  backend:
    image: schlarhmo/eventspace-backend:latest
    container_name: eventspace-backend
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/eventspace
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - eventspace-network
    restart: unless-stopped

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: eventspace-mongodb
    volumes:
      - mongo_data:/data/db
    networks:
      - eventspace-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Ollama (LLM local) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: eventspace-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - eventspace-network
    restart: unless-stopped

  # ── Watchtower (mise a jour automatique des conteneurs) ───────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: eventspace-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 60        # verifie Docker Hub toutes les 60 secondes
      WATCHTOWER_CLEANUP: "true"          # supprime les anciennes images apres update
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    command: eventspace-frontend eventspace-backend  # surveille uniquement ces 2 conteneurs
    networks:
      - eventspace-network
    restart: unless-stopped

# ── Volumes persistants ───────────────────────────────────────────────────────
volumes:
  mongo_data:
  uploads_data:
  ollama_data:

# ── Reseau interne ────────────────────────────────────────────────────────────
networks:
  eventspace-network:
    driver: bridge
